<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>README Generator</title><link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet"></head><body class="bg-gray-100 flex items-center justify-center min-h-screen"><div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md"><h1 class="text-2xl font-bold mb-6 text-center">README Generator</h1><form id="readmeForm" class="space-y-4"><input type="text" id="projectName" placeholder="Project Name" class="w-full p-2 border border-gray-300 rounded" required><textarea id="description" placeholder="Description" rows="3" class="w-full p-2 border border-gray-300 rounded" required></textarea><textarea id="features" placeholder="Features (comma-separated)" rows="2" class="w-full p-2 border border-gray-300 rounded"></textarea><textarea id="installation" placeholder="Installation Instructions" rows="3" class="w-full p-2 border border-gray-300 rounded"></textarea><textarea id="usage" placeholder="Usage Examples" rows="3" class="w-full p-2 border border-gray-300 rounded"></textarea><input type="text" id="contributing" placeholder="Contributing Guidelines URL (optional)" class="w-full p-2 border border-gray-300 rounded"><input type="text" id="license" placeholder="License (e.g., MIT)" class="w-full p-2 border border-gray-300 rounded" required><button type="submit" class="w-full bg-blue-500 text-white p-2 rounded hover:bg-blue-600">Generate README</button></form><div id="output" class="mt-6 hidden"><h2 class="text-xl font-semibold mb-2">Your README.md</h2><textarea id="readmeOutput" class="w-full p-3 border border-gray-300 rounded bg-gray-50 font-mono text-sm" rows="10" readonly></textarea><button id="downloadBtn" class="mt-4 w-full bg-green-500 text-white p-2 rounded hover:bg-green-600">Download README.md</button></div></div><script>document.getElementById('readmeForm').addEventListener('submit', async function(e) {e.preventDefault();const data = {projectName: document.getElementById('projectName').value,description: document.getElementById('description').value,features: document.getElementById('features').value.split(',').map(s => s.trim()).filter(Boolean),installation: document.getElementById('installation').value,usage: document.getElementById('usage').value,contributing: document.getElementById('contributing').value,license: document.getElementById('license').value};const response = await fetch('/api/generate-readme', {method: 'POST',headers: {'Content-Type': 'application/json'},body: JSON.stringify(data)});const result = await response.json();if (response.ok) {document.getElementById('readmeOutput').value = result.readme;document.getElementById('output').classList.remove('hidden');} else {alert(result.error || 'Failed to generate README.');}});document.getElementById('downloadBtn').addEventListener('click', function() {const readmeContent = document.getElementById('readmeOutput').value;const blob = new Blob([readmeContent], { type: 'text/markdown' });const url = URL.createObjectURL(blob);const a = document.createElement('a');a.href = url;a.download = 'README.md';document.body.appendChild(a);a.click();URL.revokeObjectURL(url);document.body.removeChild(a);});</script></body></html>
