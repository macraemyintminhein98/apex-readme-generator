<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex README Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-lg shadow-md max-w-md w-full text-center">
        <h1 class="text-3xl font-bold mb-4 text-gray-800">Apex README Generator</h1>
        <p class="text-gray-600 mb-6">Craft professional READMEs with ease.</p>
        <form action="/generate" method="get">
            <button type="submit" class="bg-blue-600 text-white px-6 py-3 rounded-lg font-semibold hover:bg-blue-700 transition w-full">
                Get Started
            </button>
        </form>
        <p class="mt-4 text-sm text-gray-500">One-time purchase: $9.99</p>
    </div>
</body>
</html>
