<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex README Generator</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css">
    <style>
        body { font-family: sans-serif; }
        .container { max-width: 900px; margin: 0 auto; padding: 20px; }
        textarea { min-height: 150px; }
    </style>
</head>
<body class="bg-gray-100 text-gray-800">
    <div class="container">
        <h1 class="text-4xl font-bold text-center mb-8">Apex README Generator</h1>
        <p class="text-center text-lg mb-10">Craft professional README.md files effortlessly.</p>

        <div id="app" class="bg-white p-8 rounded-lg shadow-md">
            <div class="mb-6">
                <label for="projectTitle" class="block text-sm font-medium text-gray-700">Project Title</label>
                <input type="text" id="projectTitle" v-model="projectTitle" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2">
            </div>

            <div class="mb-6">
                <label for="description" class="block text-sm font-medium text-gray-700">Description</label>
                <textarea id="description" v-model="description" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2"></textarea>
            </div>

            <div class="mb-6">
                <h3 class="text-lg font-medium text-gray-900 mb-2">Sections to Include:</h3>
                <div class="flex flex-wrap gap-4">
                    <label v-for="section in sections" :key="section.id" class="inline-flex items-center">
                        <input type="checkbox" v-model="section.checked" class="form-checkbox h-5 w-5 text-indigo-600">
                        <span class="ml-2 text-gray-700">{{ section.name }}</span>
                    </label>
                </div>
            </div>

            <div class="mb-8">
                <h3 class="text-lg font-medium text-gray-900 mb-2">Generated README.md (Preview)</h3>
                <pre class="bg-gray-50 p-4 rounded-md border border-gray-200 overflow-auto whitespace-pre-wrap">{{ generatedMarkdown }}</pre>
            </div>
            
            <div class="flex justify-center space-x-4">
                <button @click="copyToClipboard" class="px-6 py-3 bg-blue-600 text-white font-semibold rounded-md shadow-md hover:bg-blue-700">Copy to Clipboard</button>
                <button @click="downloadMarkdown" class="px-6 py-3 bg-indigo-600 text-white font-semibold rounded-md shadow-md hover:bg-indigo-700">Download .md</button>
            </div>

            <div class="mt-10 text-center">
                <button @click="initiatePayment" class="px-8 py-4 bg-green-600 text-white text-xl font-bold rounded-lg shadow-lg hover:bg-green-700">Unlock Full Access for ${{ price }}</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/vue@2.6.14/dist/vue.min.js"></script>
    <script src="https://js.stripe.com/v3/"></script>
    <script>
        new Vue({
            el: '#app',
            data: {
                projectTitle: 'My Awesome Project',
                description: 'A brief description of what this project does and why it\'s useful.',
                sections: [
                    { id: 'setup', name: 'Setup', content: 'bash\n# Installation instructions\nnpm install\n', checked: true },
                    { id: 'features', name: 'Features', content: '- Feature 1\n- Feature 2', checked: true },
                    { id: 'usage', name: 'Usage', content: 'javascript\n// Example usage\nconsole.log(\"Hello, World!\");\n', checked: true },
                    { id: 'contributing', name: 'Contributing', content: 'See [CONTRIBUTING.md](CONTRIBUTING.md) for guidelines.', checked: true },
                    { id: 'license', name: 'License', content: '[MIT License](LICENSE)', checked: true },
                    { id: 'badges', name: 'Badges', content: '[![Build Status](https://img.shields.io/badge/status-active-success)](link)', checked: true }
                ],
                price: 4.99
            },
            computed: {
                generatedMarkdown() {
                    let md = `# ${this.projectTitle}\n\n`;
                    md += `${this.description}\n\n`;

                    this.sections.forEach(section => {
                        if (section.checked) {
                            md += `## ${section.name}\n\n`;
                            md += `${section.content}\n\n`;
                        }
                    });

                    return md.trim();
                }
            },
            methods: {
                copyToClipboard() {
                    navigator.clipboard.writeText(this.generatedMarkdown).then(() => {
                        alert('README copied to clipboard!');
                    }).catch(err => {
                        console.error('Failed to copy: ', err);
                    });
                },
                downloadMarkdown() {
                    const element = document.createElement('a');
                    element.setAttribute('href', 'data:text/plain;charset=utf-8,' + encodeURIComponent(this.generatedMarkdown));
                    element.setAttribute('download', 'README.md');
                    element.style.display = 'none';
                    document.body.appendChild(element);
                    element.click();
                    document.body.removeChild(element);
                },
                initiatePayment() {
                    alert('Stripe integration here. Redirecting to checkout...');
                    // In a real app, this would initiate a Stripe Checkout session.
                    // Example for conceptual understanding:
                    // const stripe = Stripe('YOUR_STRIPE_PUBLIC_KEY');
                    // stripe.redirectToCheckout({
                    //     sessionId: 'SESSION_ID_FROM_YOUR_SERVER'
                    // }).then(function (result) {
                    //     if (result.error) {
                    //         alert(result.error.message);
                    //     }
                    // });
                }
            }
        });
    </script>
</body>
</html>
