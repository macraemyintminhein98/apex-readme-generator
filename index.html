<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>README Builder</title>
    <meta name="description" content="Generate professional GitHub READMEs easily.">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-lg shadow-lg max-w-md w-full text-center">
        <h1 class="text-4xl font-bold text-gray-800 mb-4">README Builder</h1>
        <p class="text-gray-600 mb-6">Craft the perfect README for your GitHub projects.</p>
        <form action="/api/generate-readme" method="POST">
            <input type="text" name="projectName" placeholder="Project Name" class="w-full p-3 mb-4 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
            <textarea name="description" placeholder="Project Description (Markdown supported)" rows="5" class="w-full p-3 mb-4 border border-gray-300 rounded resize-y focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
            <label class="block text-sm font-medium text-gray-700 mb-2 mt-4">Choose Template:</label>
            <select name="template" class="w-full p-3 mb-6 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
                <option value="basic">Basic</option>
                <option value="advanced">Advanced (with features, installation, usage sections)</option>
            </select>
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-lg transition-colors duration-200">
                Generate README
            </button>
        </form>

        <p class="text-sm text-gray-500 mt-6">One-time purchase for full access to templates & customization.</p>
        <a href="/buy" class="inline-block bg-green-500 hover:bg-green-600 text-white font-bold py-2 px-4 rounded mt-4 transition-colors duration-200">
            Buy Now - $9.99
        </a>
    </div>
</body>
</html>
