<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex README Generator</title>
    <link href="https://unpkg.com/tailwindcss@^2/dist/tailwind.min.css" rel="stylesheet">
    <style>
        .gradient-bg { background: linear-gradient(to right, #6D28D9, #9333EA); }
    </style>
</head>
<body class="bg-gray-900 text-white font-sans antialiased">
    <div class="min-h-screen flex flex-col items-center justify-center p-4">
        <header class="text-center mb-8">
            <h1 class="text-5xl font-extrabold text-transparent bg-clip-text gradient-bg">Apex README Generator</h1>
            <p class="mt-3 text-xl text-gray-300">Dynamic GitHub READMEs, effortlessly.</p>
        </header>

        <main class="bg-gray-800 p-8 rounded-lg shadow-xl max-w-2xl w-full text-center">
            <p class="mb-6 text-lg text-gray-200">
                Generate stunning, personalized, and dynamic GitHub READMEs that truly stand out.
            </p>
            <button onclick="location.href='https://github.com/login/oauth/authorize?client_id=YOUR_GITHUB_CLIENT_ID'"
                    class="gradient-bg hover:opacity-90 text-white font-bold py-3 px-6 rounded-full text-xl transition duration-300 ease-in-out transform hover:scale-105">
                Connect with GitHub
            </button>
            <p class="mt-4 text-sm text-gray-400">Free tier available.🔒 Secure &amp; Private.</p>
        </main>

        <footer class="mt-12 text-center text-gray-500">
            &copy; 2023 Apex. All rights reserved.
        </footer>
    </div>
</body>
</html>
