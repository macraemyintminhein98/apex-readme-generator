<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APEX README Generator</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        body { font-family: sans-serif; }
    </style>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">
    <div class="bg-white p-8 rounded-lg shadow-md max-w-2xl w-full">
        <h1 class="text-3xl font-bold mb-6 text-center">APEX README Generator</h1>
        <p class="text-gray-700 text-center mb-6">Craft professional GitHub READMEs in minutes.</p>
        
        <div class="mb-4">
            <label for="projectName" class="block text-gray-700 text-sm font-bold mb-2">Project Name:</label>
            <input type="text" id="projectName" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline" placeholder="e.g., My Awesome Project">
        </div>
        
        <div class="mb-6">
            <label for="projectDescription" class="block text-gray-700 text-sm font-bold mb-2">Description:</label>
            <textarea id="projectDescription" rows="4" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline" placeholder="A brief overview of your project..."></textarea>
        </div>

        <p class="text-center text-gray-600 mb-6">More options coming soon!</p>
        
        <button class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded w-full focus:outline-none focus:shadow-outline">
            Generate README (Buy Now for $4.99)
        </button>

        <p class="text-center text-xs text-gray-500 mt-4">Secure payment via Stripe.</p>

    </div>
</body>
</html>
