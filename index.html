<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>README.md Generator</title>
    <meta name="description" content="Generate professional README.md files instantly.">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        .max-w-7xl { max-width: 80rem; }
        .min-h-screen { min-height: 100vh; }
    </style>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-lg shadow-lg max-w-lg w-full text-center">
        <h1 class="text-4xl font-bold mb-4 text-gray-800">README.md Generator</h1>
        <p class="text-gray-600 mb-6">Craft professional GitHub READMEs effortlessly.</p>
        <form action="/submit" method="POST">
            <div class="mb-4">
                <input type="text" name="projectName" placeholder="Project Name" class="w-full p-3 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div class="mb-4">
                <textarea name="description" placeholder="Project Description (e.g., A tool to...)" rows="3" class="w-full p-3 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
            </div>
            <div class="mb-4">
                <select name="template" class="w-full p-3 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="basic">Basic Template</option>
                    <option value="advanced">Advanced Template</option>
                </select>
            </div>
            <button type="submit" class="w-full bg-blue-600 text-white p-3 rounded-lg hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-opacity-50 transition duration-150">Generate README</button>
        </form>
        <p class="mt-6 text-sm text-gray-500">Unlock more features and templates for just $9.99!</p>
        <div id="payment-info" class="mt-4"></div>
    </div>
    <script>
      // Placeholder for frontend logic, e.g., Stripe integration comes here.
      // For a concise demo, we'll keep the JS minimal.
      // In a real build, this would load Stripe.js and handle payment intents.
      // Example (non-functional for this demo): 
      // const paymentInfo = document.getElementById('payment-info');
      // paymentInfo.innerHTML = '<button class="mt-4 p-2 bg-green-500 text-white rounded" onclick="alert(\'Stripe checkout would open here!\')">Buy Full Version</button>';
    </script>
</body>
</html>
