<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APEX GitHub README Generator</title>
    <meta name="description" content="Generate professional GitHub READMEs instantly.">
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='-.1em' x='-.1em' font-size='100'%3E📝%3C/text%3E%3C/svg%3E">
    <style>
        body { font-family: sans-serif; margin: 20px; line-height: 1.6; background-color: #f4f4f4; color: #333; }
        .container { max-width: 800px; margin: auto; background: #fff; padding: 25px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h1, h2 { color: #2c3e50; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="text"], textarea { width: calc(100% - 20px); padding: 10px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 4px; }
        button { background-color: #007bff; color: white; padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; margin-right: 10px; }
        button:hover { background-color: #0056b3; }
        #output { background-color: #eee; border: 1px solid #ddd; padding: 15px; border-radius: 4px; white-space: pre-wrap; font-family: monospace; margin-top: 20px; display: none; }
        .demo-button { background-color: #28a745; margin-top: 15px; }
        .demo-button:hover { background-color: #218838; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 APEX GitHub README Generator</h1>
        <p>Craft a professional GitHub README.md in minutes.</p>

        <form id="readmeForm">
            <label for="projectName">Project Name</label>
            <input type="text" id="projectName" placeholder="e.g., My Awesome Project" required>

            <label for="description">Description</label>
            <textarea id="description" rows="4" placeholder="A brief overview of your project..."></textarea>

            <label for="installation">Installation</label>
            <textarea id="installation" rows="3" placeholder="How to get your project running..."></textarea>

            <label for="usage">Usage</label>
            <textarea id="usage" rows="3" placeholder="Examples of how to use your project..."></textarea>

            <label for="license">License (e.g., MIT, Apache 2.0)</label>
            <input type="text" id="license" placeholder="MIT">

            <button type="button" id="generateDemoBtn" class="demo-button">Generate Demo README (Free)</button>
        </form>

        <div id="output">
            <h2>Generated README.md (Demo)</h2>
            <pre id="readmeContent"></pre>
            <button id="copyBtn">Copy to Clipboard</button>
            <button id="downloadBtn">Download .md</button>
            <p style="margin-top: 15px;">For full features and customization, purchase the full version for $9.99.</p>
            <button onclick="alert('Redirecting to secure payment via Stripe for $9.99...')">Get Full Version ($9.99)</button>
        </div>
    </div>

    <script>
        document.getElementById('generateDemoBtn').addEventListener('click', function() {
            const projectName = document.getElementById('projectName').value || 'My Project';
            const description = document.getElementById('description').value || 'A brief description of this awesome project.';
            const installation = document.getElementById('installation').value || '`npm install` or `pip install -r requirements.txt`';
            const usage = document.getElementById('usage').value || 'javascript\nconsole.log("Hello World!");\n';
            const license = document.getElementById('license').value || 'MIT';

            const readme = `# ${projectName}

## Description
${description}

## Installation
${installation}

## Usage
${usage}

## License
This project is licensed under the ${license} License - see the LICENSE.md file for details.


*This is a demo. Get the full version for more sections and features!*`;

            document.getElementById('readmeContent').textContent = readme;
            document.getElementById('output').style.display = 'block';
        });

        document.getElementById('copyBtn').addEventListener('click', function() {
            const readmeText = document.getElementById('readmeContent').textContent;
            navigator.clipboard.writeText(readmeText).then(() => {
                alert('README copied to clipboard!');
            }).catch(err => {
                console.error('Failed to copy text: ', err);
            });
        });

        document.getElementById('downloadBtn').addEventListener('click', function() {
            const readmeText = document.getElementById('readmeContent').textContent;
            const projectName = document.getElementById('projectName').value || 'README';
            const blob = new Blob([readmeText], { type: 'text/markdown' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `${projectName.toLowerCase().replace(/\s+/g, '-')}-README.md`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        });
    </script>
</body>
</html>
