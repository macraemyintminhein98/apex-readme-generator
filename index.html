<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>README.md Generator</title>
    <style>
        body { font-family: sans-serif; margin: 2em; line-height: 1.6; background-color: #f4f7f6; color: #333; }
        h1, h2 { color: #2c3e50; }
        .container { max-width: 800px; margin: auto; background: #fff; padding: 2em; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        form div { margin-bottom: 1em; }
        label { display: block; margin-bottom: 0.5em; font-weight: bold; }
        input[type="text"], textarea { width: calc(100% - 22px); padding: 10px; border: 1px solid #ddd; border-radius: 4px; }
        textarea { min-height: 100px; resize: vertical; }
        button { background-color: #4CAF50; color: white; padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; font-size: 1em; }
        button:hover { background-color: #45a049; }
        #output { margin-top: 2em; padding: 1em; background: #eee; border: 1px solid #ddd; border-radius: 4px; white-space: pre-wrap; font-family: monospace; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Generate Your GitHub README.md</h1>
        <p>Create professional and visually appealing READMEs for your projects.</p>
        <form id="readmeForm">
            <div>
                <label for="projectName">Project Name:</label>
                <input type="text" id="projectName" placeholder="My Awesome Project" required>
            </div>
            <div>
                <label for="description">Description:</label>
                <textarea id="description" placeholder="A brief description of your project."></textarea>
            </div>
            <div>
                <label for="features">Features (comma-separated):</label>
                <input type="text" id="features" placeholder="Feature 1, Feature 2">
            </div>
            <div>
                <label for="installation">Installation:</label>
                <textarea id="installation" placeholder="How to install your project.

bash
npm install
"></textarea>
            </div>
            <div>
                <label for="usage">Usage:</label>
                <textarea id="usage" placeholder="How to use your project.

javascript
console.log('Hello');
"></textarea>
            </div>
            <div>
                <label for="license">License:</label>
                <input type="text" id="license" placeholder="MIT License">
            </div>
            <button type="submit">Generate README</button>
        </form>
        <h2>Generated README:</h2>
        <div id="output">Your README will appear here...</div>
        <button id="copyToClipboard" style="display: none; margin-top: 1em;">Copy to Clipboard</button>
    </div>
    <script>
        document.getElementById('readmeForm').addEventListener('submit', async function(event) {
            event.preventDefault();
            const data = {
                projectName: document.getElementById('projectName').value,
                description: document.getElementById('description').value,
                features: document.getElementById('features').value,
                installation: document.getElementById('installation').value,
                usage: document.getElementById('usage').value,
                license: document.getElementById('license').value
            };
            
            // In a real application, this would call a serverless function
            // For this example, we'll simulate the README generation
            const generatedReadme = `
# ${data.projectName}

${data.description}

## Features
${data.features.split(',').map(f => `- ${f.trim()}`).join('\n')}

## Installation
${data.installation}

## Usage
${data.usage}


## License
This project is licensed under the ${data.license}.
            `;

            document.getElementById('output').textContent = generatedReadme;
            document.getElementById('copyToClipboard').style.display = 'block';
        });

        document.getElementById('copyToClipboard').addEventListener('click', function() {
            const readmeContent = document.getElementById('output').textContent;
            navigator.clipboard.writeText(readmeContent).then(() => {
                alert('README copied to clipboard!');
            }).catch(err => {
                console.error('Failed to copy text: ', err);
            });
        });
    </script>
</body>
</html>
